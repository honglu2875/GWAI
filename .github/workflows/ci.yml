name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    # The crate lives in a subdirectory of the repository.
    working-directory: localization

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: localization

      - name: Format check
        run: cargo fmt --check

      - name: Clippy, default features (deny warnings)
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Clippy, all features (deny warnings)
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Test optional GMP rational backend
        run: cargo test --locked --features gmp-rational

      - name: Audit acceptance-test registry
        run: scripts/run-acceptance-tests.sh --audit-only --all-features

      - name: Rustdoc, all features (deny warnings)
        run: cargo doc --locked --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  latest-stable:
    name: latest stable
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - name: Install latest stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: localization

      - name: Test all features on latest stable
        run: cargo test --locked --all-features

      - name: Clippy all features on latest stable
        run: cargo clippy --locked --all-targets --all-features -- -D warnings


  scheduled-acceptance:
    name: scheduled acceptance (${{ matrix.backend }})
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    # The runner continues after a per-case timeout and needs enough job-level
    # headroom to write/upload every later result even if several cases hang.
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: default
            feature_args: ""
          - backend: all-features
            feature_args: "--all-features"
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: localization

      - name: Run curated scheduled mathematical holdouts
        run: >-
          scripts/run-acceptance-tests.sh
          --suite scheduled
          --profile acceptance
          --timeout-seconds 480
          ${{ matrix.feature_args }}
          --output-dir target/acceptance-tests/${{ matrix.backend }}

      - name: Publish acceptance summary
        if: always()
        run: |
          if test -f target/acceptance-tests/${{ matrix.backend }}/summary.md; then
            cat target/acceptance-tests/${{ matrix.backend }}/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload acceptance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mathematical-acceptance-${{ matrix.backend }}
          path: localization/target/acceptance-tests/${{ matrix.backend }}/
          if-no-files-found: warn
